services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pravasi-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pravasi-network
    volumes:
      - logs:/app/logs

  # Uncomment for local development without MongoDB Atlas.
  # Point MONGO_URL at mongodb://mongo:27017/ when using this service.
  # mongo:
  #   image: mongo:7
  #   container_name: pravasi-mongo
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongo-data:/data/db
  #   networks:
  #     - pravasi-network

networks:
  pravasi-network:
    driver: bridge

volumes:
  logs:
  # mongo-data:
